name: Build and publish dev prerelease

on:
  push:
    branches: [ "dev" ]
    paths:
      - '.cargo/**/*'
      - '.github/**/*'
      - 'src/**/*'
      - 'Cargo.toml'
      - 'Cargo.lock'

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: edge-dev

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact_name: kinly-x86_64-unknown-linux-gnu
            libc_version: 2.16
          - runs_on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_name: kinly-aarch64-unknown-linux-gnu
            libc_version: 2.17

    runs-on: ${{ matrix.runs_on }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Build release with cargo-zigbuild
        run: cargo zigbuild --release --locked --target ${{ matrix.target }}.${{ matrix.libc_version }}

      - name: Normalize artifact
        run: cp target/release/kinly target/release/${{ matrix.artifact_name }}

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/release/${{ matrix.artifact_name }}

  publish:
    name: Publish Edge Release
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute variables
        id: vars
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "full_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "date=$(date +'%Y-%m-%d %H:%M')" >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Remove old release and tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete ${{ env.RELEASE_TAG }} --yes || true
          git push --delete origin refs/tags/${{ env.RELEASE_TAG }} || true

      - name: Create new edge release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.RELEASE_TAG }}
          commit: ${{ github.sha }}
          name: Dev Build ${{ steps.vars.outputs.short_sha }}
          prerelease: true
          makeLatest: false
          artifacts: artifacts/*
          body: |
            Development build from commit ${{ steps.vars.outputs.full_sha }}
            Built on: ${{ steps.vars.outputs.date }}
          token: ${{ secrets.GITHUB_TOKEN }}
